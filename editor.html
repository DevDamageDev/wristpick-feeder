<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src https://api.github.com;">
<title>Wristpick Feeder Editor</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --text: #eee;
    --text-dim: #999;
    --border: #2a2a4a;
    --success: #2ed573;
    --danger: #ff4757;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
  }

  header h1 span { color: var(--accent); }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .status {
    font-size: 13px;
    color: var(--text-dim);
    padding-right: 8px;
  }

  .status.dirty { color: var(--accent); font-weight: 500; }

  main {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px 120px;
  }

  /* Setup screen */
  #setup {
    max-width: 480px;
    margin: 80px auto;
    text-align: center;
  }

  #setup h2 { margin-bottom: 8px; }
  #setup p { color: var(--text-dim); margin-bottom: 24px; font-size: 14px; }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
    margin-bottom: 16px;
  }

  .input-group label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
  }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea { resize: vertical; min-height: 60px; }

  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }

  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
  }

  .btn-secondary:hover { background: #1a4a80; }

  .btn-small {
    padding: 6px 12px;
    font-size: 13px;
  }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  .btn-danger:hover { background: var(--danger); color: white; }

  .btn-success {
    background: var(--success);
    color: #111;
  }

  .btn-success:hover { background: #7bed9f; }

  .btn-icon {
    background: transparent;
    padding: 6px;
    color: var(--text-dim);
    font-size: 18px;
    line-height: 1;
  }

  .btn-icon:hover { color: var(--text); }

  /* Sections */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
  }

  .section-header h3 { font-size: 15px; font-weight: 600; }

  .section-header .badge {
    background: var(--accent);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    margin-left: 8px;
  }

  .section-actions {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .section-body { padding: 12px 16px; }

  /* Resource cards */
  .resource {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }

  .resource:hover { border-color: var(--accent); }

  .resource-info { flex: 1; min-width: 0; }

  .resource-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
  }

  .resource-name a {
    color: var(--text);
    text-decoration: none;
  }

  .resource-name a:hover { color: var(--accent); }

  .resource-platform {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .resource-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .resource-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 16px;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
  }

  .modal h3 { margin-bottom: 16px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: #111;
    padding: 10px 24px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    z-index: 300;
    animation: toast-in 0.3s ease;
  }

  .toast.error { background: var(--danger); color: white; }

  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .add-section-bar {
    text-align: center;
    padding: 16px;
  }

  /* Drag hint */
  .section.drag-over { border-color: var(--accent); }

  .move-btns { display: flex; flex-direction: column; gap: 0; }
  .move-btns button { padding: 2px 6px; font-size: 12px; }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup">
  <h2>Wristpick Feeder <span style="color:var(--accent)">Editor</span></h2>
  <p>Enter your GitHub personal access token to get started.<br>
  It's stored only in your browser's localStorage.</p>
  <div class="input-group">
    <label>GitHub Personal Access Token</label>
    <input type="password" id="tokenInput" placeholder="github_pat_...">
  </div>
  <div class="input-group">
    <label>Repository</label>
    <input type="text" id="repoInput" value="DevDamageDev/wristpick-feeder" readonly style="opacity:0.6">
  </div>
  <button onclick="connect()" id="connectBtn">Connect</button>
</div>

<!-- Editor Screen (hidden by default) -->
<div id="editor" style="display:none">
  <header>
    <h1>Wristpick <span>Feeder</span></h1>
    <div class="header-actions">
      <span class="status" id="statusText">Saved</span>
      <button class="btn-success btn-small" id="publishBtn" onclick="publish()" disabled>Publish</button>
      <button class="btn-icon" onclick="disconnect()" title="Disconnect">&times;</button>
    </div>
  </header>
  <main id="main"></main>
</div>

<!-- Modal container -->
<div id="modalContainer"></div>

<script>
const REPO = 'DevDamageDev/wristpick-feeder';
const FILE_PATH = 'resources.json';
const BRANCH = 'main';
const API = 'https://api.github.com';

let token = '';
let data = null;
let fileSha = '';
let dirty = false;

// --- Init ---
function init() {
  const saved = localStorage.getItem('wf_token');
  if (saved) {
    token = saved;
    document.getElementById('tokenInput').value = saved;
    connect();
  }
}

async function connect() {
  const input = document.getElementById('tokenInput').value.trim();
  if (!input) return;
  token = input;
  document.getElementById('connectBtn').disabled = true;
  document.getElementById('connectBtn').textContent = 'Connecting...';

  try {
    await fetchData();
    localStorage.setItem('wf_token', token);
    document.getElementById('setup').style.display = 'none';
    document.getElementById('editor').style.display = 'block';
    render();
  } catch (e) {
    toast('Connection failed: ' + e.message, true);
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('connectBtn').textContent = 'Connect';
  }
}

function disconnect() {
  localStorage.removeItem('wf_token');
  token = '';
  data = null;
  document.getElementById('setup').style.display = 'block';
  document.getElementById('editor').style.display = 'none';
  document.getElementById('connectBtn').disabled = false;
  document.getElementById('connectBtn').textContent = 'Connect';
}

// --- GitHub API ---
async function ghFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.message || res.statusText);
  }
  return res.json();
}

async function fetchData() {
  const resp = await ghFetch(`/repos/${REPO}/contents/${FILE_PATH}?ref=${BRANCH}`);
  fileSha = resp.sha;
  const content = atob(resp.content.replace(/\n/g, ''));
  data = JSON.parse(content);
}

async function publish() {
  if (!dirty) return;
  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.textContent = 'Publishing...';

  data.updated = new Date().toISOString().slice(0, 10);
  const json = JSON.stringify(data, null, 2) + '\n';
  const encoded = btoa(unescape(encodeURIComponent(json)));

  try {
    const resp = await ghFetch(`/repos/${REPO}/contents/${FILE_PATH}`, {
      method: 'PUT',
      body: JSON.stringify({
        message: 'Update resources via Wristpick Feeder Editor',
        content: encoded,
        sha: fileSha,
        branch: BRANCH,
      }),
    });
    fileSha = resp.content.sha;
    setDirty(false);
    toast('Published to GitHub');
  } catch (e) {
    toast('Publish failed: ' + e.message, true);
  } finally {
    btn.textContent = 'Publish';
    btn.disabled = !dirty;
  }
}

// --- State ---
function setDirty(v) {
  dirty = v;
  const st = document.getElementById('statusText');
  const btn = document.getElementById('publishBtn');
  if (dirty) {
    st.textContent = 'Unsaved changes';
    st.className = 'status dirty';
    btn.disabled = false;
  } else {
    st.textContent = 'Saved';
    st.className = 'status';
    btn.disabled = true;
  }
}

// --- Render ---
function render() {
  const main = document.getElementById('main');
  if (!data.sections.length) {
    main.innerHTML = `
      <div class="empty-state">No sections yet. Add one to get started.</div>
      <div class="add-section-bar">
        <button onclick="openSectionModal()">+ Add Section</button>
      </div>`;
    return;
  }

  let html = '';
  data.sections.forEach((section, si) => {
    html += `<div class="section">
      <div class="section-header" onclick="toggleSection(${si})">
        <div>
          <h3>${esc(section.title)} <span class="badge">${section.resources.length}</span></h3>
        </div>
        <div class="section-actions" onclick="event.stopPropagation()">
          <div class="move-btns">
            ${si > 0 ? `<button class="btn-icon" onclick="moveSection(${si},-1)" title="Move up">&uarr;</button>` : ''}
            ${si < data.sections.length - 1 ? `<button class="btn-icon" onclick="moveSection(${si},1)" title="Move down">&darr;</button>` : ''}
          </div>
          <button class="btn-icon" onclick="openSectionModal(${si})" title="Edit section">&#9998;</button>
          <button class="btn-icon" onclick="deleteSection(${si})" title="Delete section" style="color:var(--danger)">&times;</button>
        </div>
      </div>
      <div class="section-body" id="section-body-${si}">`;

    section.resources.forEach((r, ri) => {
      html += `<div class="resource">
        <div class="resource-info">
          <div class="resource-platform">${esc(r.platform || '')}</div>
          <div class="resource-name"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.name)}</a></div>
          <div class="resource-desc">${esc(r.description)}</div>
        </div>
        <div class="resource-actions">
          ${ri > 0 ? `<button class="btn-icon" onclick="moveResource(${si},${ri},-1)" title="Move up">&uarr;</button>` : ''}
          ${ri < section.resources.length - 1 ? `<button class="btn-icon" onclick="moveResource(${si},${ri},1)" title="Move down">&darr;</button>` : ''}
          <button class="btn-icon" onclick="openResourceModal(${si},${ri})" title="Edit">&#9998;</button>
          <button class="btn-icon" onclick="deleteResource(${si},${ri})" title="Delete" style="color:var(--danger)">&times;</button>
        </div>
      </div>`;
    });

    html += `<button class="btn-secondary btn-small" onclick="openResourceModal(${si})" style="margin-top:8px">+ Add Resource</button>`;
    html += `</div></div>`;
  });

  html += `<div class="add-section-bar"><button onclick="openSectionModal()">+ Add Section</button></div>`;
  main.innerHTML = html;
}

// --- Section ops ---
function moveSection(i, dir) {
  const s = data.sections;
  [s[i], s[i + dir]] = [s[i + dir], s[i]];
  setDirty(true);
  render();
}

function deleteSection(i) {
  if (!confirm(`Delete section "${data.sections[i].title}" and all its resources?`)) return;
  data.sections.splice(i, 1);
  setDirty(true);
  render();
}

function openSectionModal(editIdx) {
  const editing = editIdx !== undefined;
  const current = editing ? data.sections[editIdx] : {};
  showModal({
    title: editing ? 'Edit Section' : 'New Section',
    fields: [
      { key: 'title', label: 'Section Title', value: current.title || '', type: 'text' },
    ],
    onSave(vals) {
      if (!vals.title.trim()) return;
      if (editing) {
        data.sections[editIdx].title = vals.title.trim();
      } else {
        data.sections.push({ title: vals.title.trim(), resources: [] });
      }
      setDirty(true);
      render();
    }
  });
}

// --- Resource ops ---
function moveResource(si, ri, dir) {
  const r = data.sections[si].resources;
  [r[ri], r[ri + dir]] = [r[ri + dir], r[ri]];
  setDirty(true);
  render();
}

function deleteResource(si, ri) {
  const r = data.sections[si].resources[ri];
  if (!confirm(`Delete "${r.name}"?`)) return;
  data.sections[si].resources.splice(ri, 1);
  setDirty(true);
  render();
}

function openResourceModal(si, editRi) {
  const editing = editRi !== undefined;
  const current = editing ? data.sections[si].resources[editRi] : {};
  showModal({
    title: editing ? 'Edit Resource' : 'New Resource',
    fields: [
      { key: 'name', label: 'Name', value: current.name || '', type: 'text' },
      { key: 'platform', label: 'Platform', value: current.platform || 'youtube', type: 'select',
        options: ['youtube', 'blog', 'instagram', 'reddit', 'forum', 'shop', 'other'] },
      { key: 'url', label: 'URL', value: current.url || '', type: 'text', placeholder: 'https://...' },
      { key: 'description', label: 'Description', value: current.description || '', type: 'textarea' },
    ],
    onSave(vals) {
      if (!vals.name.trim() || !vals.url.trim()) return;
      const entry = {
        name: vals.name.trim(),
        platform: vals.platform,
        url: vals.url.trim(),
        description: vals.description.trim(),
      };
      if (editing) {
        data.sections[si].resources[editRi] = entry;
      } else {
        data.sections[si].resources.push(entry);
      }
      setDirty(true);
      render();
    }
  });
}

// --- Modal system ---
function showModal({ title, fields, onSave }) {
  const container = document.getElementById('modalContainer');
  let html = `<div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>${title}</h3>`;

  fields.forEach(f => {
    html += `<div class="input-group"><label>${f.label}</label>`;
    if (f.type === 'textarea') {
      html += `<textarea id="modal-${f.key}">${esc(f.value)}</textarea>`;
    } else if (f.type === 'select') {
      html += `<select id="modal-${f.key}">`;
      f.options.forEach(o => {
        html += `<option value="${o}" ${o === f.value ? 'selected' : ''}>${o}</option>`;
      });
      html += `</select>`;
    } else {
      html += `<input type="text" id="modal-${f.key}" value="${esc(f.value)}" placeholder="${f.placeholder || ''}">`;
    }
    html += `</div>`;
  });

  html += `<div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button id="modalSaveBtn">Save</button>
    </div></div></div>`;

  container.innerHTML = html;

  document.getElementById('modalSaveBtn').onclick = () => {
    const vals = {};
    fields.forEach(f => {
      vals[f.key] = document.getElementById('modal-' + f.key).value;
    });
    onSave(vals);
    closeModal();
  };

  // Focus first input
  setTimeout(() => {
    const first = container.querySelector('input, textarea');
    if (first) first.focus();
  }, 50);

  // Enter key to save
  container.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
      document.getElementById('modalSaveBtn').click();
    }
  });
}

function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

function toggleSection(i) {
  const body = document.getElementById('section-body-' + i);
  if (body) body.style.display = body.style.display === 'none' ? '' : 'none';
}

// --- Utils ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function toast(msg, isError) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Warn before leaving with unsaved changes
window.onbeforeunload = (e) => {
  if (dirty) { e.preventDefault(); return ''; }
};

init();
</script>
</body>
</html>
